<!DOCTYPE html>
<html>
<body>
    <h2>Diagnóstico de Tutor de Mates</h2>
    <input type="text" id="testInput" value="¿Cuánto es 2+2?">
    <button onclick="probar()">Probar Conexión</button>
    <div id="log" style="white-space: pre-wrap; background: #eee; padding: 10px; margin-top: 10px;"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        window.probar = async function() {
            const log = document.getElementById("log");
            const key = "TU_API_KEY_AQUI"; // <--- PON TU LLAVE AQUÍ
            
            log.innerHTML = "Iniciando prueba...";
            
            try {
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(document.getElementById("testInput").value);
                const response = await result.response;
                log.innerHTML = "✅ ÉXITO: " + response.text();
            } catch (error) {
                log.innerHTML = "❌ ERROR: " + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
